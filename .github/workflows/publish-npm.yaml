# .github/workflows/release-patch-publish.yml
name: Release (patch) + Publish (pnpm)

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

permissions:
  contents: write # needed to push the version-bump commit
  id-token: write # needed for npm provenance

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    # Prevent the workflow from running on its own bump commit
    if: >
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip release]')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        # with:
        #   version: 9

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm run build

      # Gate the release on the ROOT jest run (all workspace projects).
      - name: Test
        env:
          JEST_JUNIT_OUTPUT_DIR: reports/junit
          JEST_JUNIT_OUTPUT_NAME: jest-junit.xml
        run: pnpm run test:ci

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: junit-test-results
          path: reports/junit/
          if-no-files-found: ignore

      - name: Configure git author
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch versions (workspace)
        run: |
          # Bumps every workspace package; updates internal dependency ranges.
          # Does NOT create git tags/commits (we do that manually).
          pnpm -r exec -- pnpm version patch --no-git-tag-version

      - name: Commit version bump (skip re-run)
        run: |
          # If nothing changed (e.g., no publishable packages), don't fail.
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git add package.json pnpm-lock.yaml packages/*/package.json examples/*/package.json
          git commit -m "chore(release): bump patch [skip release]"
          git push

      - name: Publish to npm (all workspace packages)
        env:
          # npm/pnpm reads this token only while publishing.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Publishes all non-private packages in dependency order.
          # --no-git-checks avoids failure in CI environments.
          pnpm -r publish --access public --no-git-checks --provenance
