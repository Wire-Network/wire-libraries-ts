name: Dependency Audit

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Install deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit dependencies
        id: audit
        continue-on-error: true
        run: pnpm audit --audit-level=moderate

      - name: Report audit failure
        if: steps.audit.outcome == 'failure'
        env:
          AUDIT_ISSUE_TITLE: Weekly dependency audit failed
          GH_TOKEN: ${{ github.token }}
        run: |
          issue_number="$(
            gh issue list \
              --state open \
              --limit 100 \
              --json number,title \
              --jq "map(select(.title == \"$AUDIT_ISSUE_TITLE\")) | first | .number // empty"
          )"

          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          body="Dependency audit failed for commit $GITHUB_SHA. Run: $run_url"

          if [[ -n "$issue_number" ]]; then
            gh issue comment "$issue_number" --body "$body"
          else
            gh issue create --title "$AUDIT_ISSUE_TITLE" --body "$body"
          fi

      - name: Fail on audit findings
        if: steps.audit.outcome == 'failure'
        run: exit 1
